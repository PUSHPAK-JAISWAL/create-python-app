name: Shellcheck
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
jobs:
  shellcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - run: |
          if compgen -G "**/*.sh" > /dev/null; then
            sudo apt-get update && sudo apt-get install -y shellcheck
            find . -name "*.sh" -print0 | xargs -0 shellcheck
          else
            echo "No shell scripts; skipping"
          fi

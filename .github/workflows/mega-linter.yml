name: MegaLinter
on:
  push:
  pull_request:
    branches: [main]
jobs:
  megalinter:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - uses: oxsecurity/megalinter/flavors/python@v9
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
